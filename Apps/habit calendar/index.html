<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Deficit</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="apple_touch_icon.png">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <h1>Today</h1>
    <div class="date-subtitle" id="header-date"></div>
  </header>

  <div class="card">
    <div class="card-title">Cumulative deficit</div>
    <div class="flex-between">
      <div class="cumulative-val" id="ui-cum-kcal">0 kcal</div>
      <div class="cumulative-kg" id="ui-cum-kg">0.00kg</div>
    </div>
  </div>

  <div class="card">
    <div class="calendar-header">
      <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
    </div>
    <div class="calendar-grid" id="calendar-grid">
    </div>
  </div>

  <div class="card">
    <div class="card-title">Calories</div>
    <div class="input-wrapper">
      <input type="number" id="calorie-input" placeholder="0" inputmode="numeric">
      <div class="input-suffix" id="status-text">Enter calories</div>
    </div>
    <div class="btn-group">
      <button class="btn btn-save" onclick="saveData()">Save</button>
      <button class="btn btn-reset" onclick="resetData()">Reset</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
